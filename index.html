<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portada Moodle</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }


    html, body {
      height: 100%;
      font-family: Arial, sans-serif;
    }


    /* ====== PORTADA PRINCIPAL ====== */
    .portada {
      height: 100vh;
      width: 100%;
      background-image: url("imgs/fondo-compu.jpg"); /*imagen de escritorio */
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
      display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
    }



    /* ====== ÍCONOS EN DESKTOP ====== */
    

.fila1, .fila2, .fila3 {
  display: flex;
  justify-content: center;
  gap: 5px;
  
}

/* Estilos base para todas las imágenes */
.portada img {
  width: 150px;
  height: auto;
  display: block;
}

.fila1 img {
  width: 300px;
}

.fila2 img,
.fila3 img {
  width: 200px; 
}
  
.fila1 a,
.fila2 a,
.fila3 a {
      text-decoration: none;
    }

    .fila1 img,
    .fila2 img, 
    .fila3 img {
      transition: transform 0.3s ease;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
    }
    
    .fila1 img:hover,
    .fila2 img:hover,
    .fila3 img:hover {
      transform: scale(1.2);
    }


    /* ====== FONDO PARA MOBILE ====== */
    @media (max-width: 1024px) {
      .portada {
        background-image: url("imgs/imgs_mobile/fondo-mobile.jpg"); /* imagen para mobile */
      }
    }


  @media (max-width: 600px) {

  .portada {
    display: grid;
    grid-template-columns: 1fr 1fr; /* 2 columnas iguales */
    gap: 2px;
    padding: 4px;
    justify-items: center;
    align-items: center;
  }

  /* Eliminamos estructura de filas para que entren al grid */
  .fila1, .fila2, .fila3 {
    display: contents;
  }

  /* Tamaño uniforme */
  .portada img {
    width: 100%;
    max-width: 120px;
    height: auto;
  }

  /* Reemplazo imágenes mobile */
  .fila1 img {
    content: url("imgs/imgs_mobile/boton-consigna-mobile.png");
  }

  .fila2 a:nth-child(1) img {
    content: url("imgs/imgs_mobile/boton-tiempo1-mobile.png");
  }
  .fila2 a:nth-child(2) img {
    content: url("imgs/imgs_mobile/boton-tiempo2-mobile.png");
  }
  .fila2 a:nth-child(3) img {
    content: url("imgs/imgs_mobile/boton-tiempo3-mobile.png");
  }
  .fila2 a:nth-child(4) img {
    content: url("imgs/imgs_mobile/boton-revision-mobile.png");
  }

  .fila3 a:nth-child(1) img {
    content: url("imgs/imgs_mobile/boton-mesa-mobile.png");
  }
  .fila3 a:nth-child(2) img {
    content: url("imgs/imgs_mobile/boton-material-mobile.png");
  }
}


  </style>
</head>
<body>
  <div class="portada">
    <!-- Primera fila: 1 botón -->
    <div class="fila1">
      <a href="https://isep-cba.edu.ar/campus/mod/book/view.php?id=20893" target="_blank">
        <img src="imgs/boton-consigna.png" alt="Icono 1">
      </a>
    </div>

    <!-- Segunda fila: 4 botones -->
    <div class="fila2">
      <a href="https://isep-cba.edu.ar/campus/mod/book/view.php?id=20890" target="_blank">
        <img src="imgs/boton-tiempo1.png" alt="Icono 2">
      </a>
      <a href="https://isep-cba.edu.ar/campus/mod/book/view.php?id=20891" target="_blank">
        <img src="imgs/boton-tiempo2.png" alt="Icono 3">
      </a>
      <a href="https://isep-cba.edu.ar/campus/mod/book/view.php?id=20892" target="_blank">
        <img src="imgs/boton-tiempo3.png" alt="Icono 4">
      </a>
      <a href="https://isep-cba.edu.ar/campus/mod/book/view.php?id=20894" target="_blank">
        <img src="imgs/boton-revision.png" alt="Icono 5">
      </a>
    </div>

    <!-- Tercera fila: 2 botones -->
    <div class="fila3">
      <a href="https://view.genially.com/688a549c7ff1a394773d4007" target="_blank">
        <img src="imgs/boton-mesa.png" alt="Icono 6" style="margin-top: 22px;">
      </a>
      <a href="https://view.genially.com/6894a4fe28c2309ec20a8c95" target="_blank">
        <img src="imgs/boton-material.png" alt="Icono 7"> 
      </a>
    </div>
  </div>
</body>
